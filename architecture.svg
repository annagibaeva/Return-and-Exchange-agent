<svg width="100%" viewBox="0 0 680 540" role="img" xmlns="http://www.w3.org/2000/svg"><title>Returns and exchange agent architecture</title><desc>A customer message flows into a primary agent that selects composable skills, which call mock systems of record. The drafted response passes through a supervisor that checks policy before sending to the customer or escalating to a human.</desc>
